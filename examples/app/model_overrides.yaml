# Layer 2: app-specific overrides.
#
# These override each model's base config defaults, but are themselves overridden
# by runtime UI params (Layer 3). Load them with:
#
#   hub.resolve_from_app("qwen-image", "examples/app/model_overrides.yaml",
#                        runtime_params={"num_inference_steps": 40})
#
# Merge order (later wins):  base config.yaml  <  these overrides  <  runtime params
models:

  qwen-image:
    defaults:
      num_inference_steps: 30      # faster previews in this app
      true_cfg_scale: 3.5
    hardware:
      dtype: float16               # this app runs on smaller GPUs

  z-image-turbo:
    defaults:
      width: 768
      height: 768

  chatterbox:
    defaults:
      exaggeration: 0.65           # a bit more expressive for this product
      language_id: "en"

  qwen3.6:
    defaults:
      enable_thinking: false       # this app wants fast, non-reasoning answers
      temperature: 0.7
      top_p: 0.8
      max_tokens: 4096
