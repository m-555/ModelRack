# ── Identity ──────────────────────────────────────────────
model_id: wan-2.2-i2v
display_name: WAN 2.2 (Image-to-Video, A14B)
type: video_generation
backend: local
version: "2.2"
tags: [video, i2v, diffusion, moe]

# ── Weights (relative to this model folder) ───────────────
# diffusers loads from the weights/ directory (from_pretrained).
weights:
  main: weights

# ── Hardware ──────────────────────────────────────────────
hardware:
  min_vram_gb: 24
  recommended_vram_gb: 80
  dtype: bfloat16          # float16 | bfloat16 | float32
  device: cuda

# ── Inference server ──────────────────────────────────────
server:
  port: 7801
  host: "127.0.0.1"
  startup_timeout_sec: 300  # A14B is slow to load
  endpoints:
    infer:  "POST /infer"
    health: "GET /health"
    unload: "POST /unload"
    info:   "GET /info"

# ── Isolated environment ──────────────────────────────────
environment:
  python_version: "3.11"
  requirements_file: requirements.txt
  venv_path: .venv

# ── Default runtime parameters ────────────────────────────
defaults:
  num_inference_steps: 40
  guidance_scale: 3.5
  num_frames: 81
  width: 832
  height: 480
  fps: 16
  seed: -1
  negative_prompt: ""

# ── Parameter schema (drives dynamic UI rendering in apps) ─
param_schema:
  prompt:
    type: str
    label: "Prompt"
    description: "Text describing the motion/scene to animate."
  image:
    type: str
    label: "Input Image"
    description: "Path or base64 of the source image to animate (I2V)."
  negative_prompt:
    type: str
    label: "Negative Prompt"
    description: "Content/styles to avoid."
  num_inference_steps:
    type: int
    min: 10
    max: 60
    step: 1
    label: "Inference Steps"
    description: "More steps = higher quality, slower."
  guidance_scale:
    type: float
    min: 1.0
    max: 8.0
    step: 0.5
    label: "Guidance Scale"
    description: "Prompt adherence (CFG). WAN 2.2 default ~3.5."
  num_frames:
    type: int
    min: 49
    max: 81
    step: 4
    label: "Number of Frames"
    description: "81 frames ≈ 5s @ 16fps."
  width:
    type: int
    options: [480, 512, 640, 720, 832, 1024, 1280]
    label: "Width"
  height:
    type: int
    options: [288, 360, 480, 576, 720]
    label: "Height"
  fps:
    type: int
    min: 8
    max: 24
    step: 1
    label: "FPS"
  seed:
    type: int
    min: -1
    max: 2147483647
    label: "Seed"
    description: "-1 for random."

# ── Load hints for server.py ───────────────────────────────
load_hints:
  framework: diffusers
  pipeline_class: WanImageToVideoPipeline
  hf_repo: Wan-AI/Wan2.2-I2V-A14B-Diffusers
  requires_packages:
    - diffusers>=0.32.0
    - torch>=2.5.0
    - transformers>=4.49.0

# ── Serving hints ──────────────────────────────────────────
serving:
  engine: diffusers
  enable_model_cpu_offload: true   # for <80GB GPUs

# ── Metadata ──────────────────────────────────────────────
meta:
  license: Apache-2.0
  source: "https://huggingface.co/Wan-AI/Wan2.2-I2V-A14B-Diffusers"
  notes: "27B MoE (two 14B experts), 14B active per step. Native (non-diffusers) weights: Wan-AI/Wan2.2-I2V-A14B."
