# ── Identity ──────────────────────────────────────────────
model_id: qwen-image
display_name: Qwen-Image (2512)
type: image_generation
backend: local
version: "2512"
tags: [image, diffusion, qwen]

weights:
  main: weights

hardware:
  min_vram_gb: 24
  recommended_vram_gb: 48
  dtype: bfloat16
  device: cuda

server:
  port: 7803
  host: "127.0.0.1"
  startup_timeout_sec: 180
  endpoints:
    infer:  "POST /infer"
    health: "GET /health"
    unload: "POST /unload"
    info:   "GET /info"

environment:
  python_version: "3.11"
  requirements_file: requirements.txt
  venv_path: .venv

defaults:
  num_inference_steps: 50
  true_cfg_scale: 4.0
  width: 1328
  height: 1328
  aspect_ratio: "1:1"
  negative_prompt: ""
  seed: -1

param_schema:
  prompt:
    type: str
    label: "Prompt"
    description: "Text description of the image (supports EN/ZH)."
  negative_prompt:
    type: str
    label: "Negative Prompt"
    description: "Content/styles to avoid."
  num_inference_steps:
    type: int
    min: 20
    max: 100
    step: 1
    label: "Inference Steps"
  true_cfg_scale:
    type: float
    min: 1.0
    max: 10.0
    step: 0.5
    label: "True CFG Scale"
    description: "Prompt adherence. Default 4.0."
  aspect_ratio:
    type: str
    options: ["1:1", "16:9", "9:16", "4:3", "3:4", "3:2", "2:3"]
    label: "Aspect Ratio"
    description: "Preset aspect ratio (sets width/height)."
  width:
    type: int
    min: 928
    max: 1664
    step: 16
    label: "Width"
  height:
    type: int
    min: 928
    max: 1664
    step: 16
    label: "Height"
  seed:
    type: int
    min: -1
    max: 2147483647
    label: "Seed"
    description: "-1 for random."

load_hints:
  framework: diffusers
  pipeline_class: DiffusionPipeline
  hf_repo: Qwen/Qwen-Image-2512
  requires_packages:
    - diffusers>=0.32.0
    - torch>=2.5.0
    - transformers>=4.49.0

serving:
  engine: diffusers
  enable_model_cpu_offload: true

meta:
  license: Apache-2.0
  source: "https://huggingface.co/Qwen/Qwen-Image-2512"
  notes: "Supported aspect ratios: 1:1=1328x1328, 16:9=1664x928, 9:16=928x1664, 4:3=1472x1104, 3:2=1584x1056."
