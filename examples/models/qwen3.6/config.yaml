# ── Identity ──────────────────────────────────────────────
model_id: qwen3.6
display_name: Qwen3.6 35B-A3B
type: language
backend: local
version: "3.6"
tags: [language, llm, moe, thinking, qwen]

weights:
  main: weights

hardware:
  min_vram_gb: 80
  recommended_vram_gb: 160
  dtype: bfloat16
  device: cuda

server:
  port: 7809
  host: "127.0.0.1"
  startup_timeout_sec: 600
  endpoints:
    infer:  "POST /infer"
    health: "GET /health"
    unload: "POST /unload"
    info:   "GET /info"

environment:
  python_version: "3.11"
  requirements_file: requirements.txt
  venv_path: .venv

# Defaults tuned for Thinking mode / general tasks (see param_schema notes).
defaults:
  temperature: 1.0
  top_p: 0.95
  top_k: 20
  min_p: 0.0
  presence_penalty: 1.5
  repetition_penalty: 1.0
  max_tokens: 32768
  enable_thinking: true
  seed: -1

param_schema:
  messages:
    type: list
    label: "Messages"
    description: "Chat messages ({role, content})."
  prompt:
    type: str
    label: "Prompt"
    description: "Raw prompt (alternative to messages)."
  enable_thinking:
    type: bool
    label: "Thinking Mode"
    description: "Enable chain-of-thought reasoning (default on)."
  temperature:
    type: float
    min: 0.0
    max: 2.0
    step: 0.05
    label: "Temperature"
    description: "Thinking/general 1.0; precise coding 0.6; instruct 0.7."
  top_p:
    type: float
    min: 0.0
    max: 1.0
    step: 0.05
    label: "Top-p"
    description: "0.95 (thinking) / 0.80 (instruct)."
  top_k:
    type: int
    min: 0
    max: 100
    step: 1
    label: "Top-k"
  min_p:
    type: float
    min: 0.0
    max: 1.0
    step: 0.01
    label: "Min-p"
  presence_penalty:
    type: float
    min: -2.0
    max: 2.0
    step: 0.1
    label: "Presence Penalty"
    description: "1.5 for general; 0.0 for precise coding."
  repetition_penalty:
    type: float
    min: 1.0
    max: 2.0
    step: 0.05
    label: "Repetition Penalty"
  max_tokens:
    type: int
    min: 1
    max: 81920
    step: 1
    label: "Max New Tokens"
    description: "32768 standard; up to 81920 for complex problems."
  seed:
    type: int
    min: -1
    max: 2147483647
    label: "Seed"

load_hints:
  framework: vllm
  hf_repo: Qwen/Qwen3.6-35B-A3B
  reasoning_parser: qwen3
  requires_packages:
    - vllm>=0.6.3
    - torch>=2.5.0

serving:
  engine: vllm
  tensor_parallel_size: 8
  max_model_len: 262144        # native; up to 1010000 with YaRN RoPE scaling
  gpu_memory_utilization: 0.9
  reasoning_parser: qwen3

meta:
  license: Apache-2.0
  source: "https://huggingface.co/Qwen/Qwen3.6-35B-A3B"
  notes: "MoE 35B total / 3B active (256 experts). Hybrid Gated DeltaNet + Gated Attention. Native 256K context (up to ~1M with YaRN)."
