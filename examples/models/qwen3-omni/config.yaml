# ── Identity ──────────────────────────────────────────────
model_id: qwen3-omni
display_name: Qwen3-Omni 30B-A3B Instruct
type: omni
backend: local
version: "3"
tags: [omni, multimodal, audio, vision, language, moe, qwen]

weights:
  main: weights

hardware:
  min_vram_gb: 79         # Instruct, 15s video (BF16)
  recommended_vram_gb: 145
  dtype: bfloat16
  device: cuda

server:
  port: 7808
  host: "127.0.0.1"
  startup_timeout_sec: 600
  endpoints:
    infer:  "POST /infer"
    health: "GET /health"
    unload: "POST /unload"
    info:   "GET /info"

environment:
  python_version: "3.11"
  requirements_file: requirements.txt
  venv_path: .venv

defaults:
  temperature: 0.6
  top_p: 0.95
  top_k: 20
  max_tokens: 1024
  return_audio: false
  speaker: "Ethan"
  use_audio_in_video: true
  seed: -1

param_schema:
  messages:
    type: list
    label: "Messages"
    description: "Multimodal chat: text / image / audio / video content."
  temperature:
    type: float
    min: 0.0
    max: 2.0
    step: 0.05
    label: "Temperature"
  top_p:
    type: float
    min: 0.0
    max: 1.0
    step: 0.05
    label: "Top-p"
  top_k:
    type: int
    min: 0
    max: 100
    step: 1
    label: "Top-k"
  max_tokens:
    type: int
    min: 1
    max: 16384
    step: 1
    label: "Max New Tokens"
  return_audio:
    type: bool
    label: "Return Speech"
    description: "Also generate spoken audio output (Talker). Uses more VRAM."
  speaker:
    type: str
    options: [Ethan, Chelsie, Aiden]
    label: "Voice"
    description: "Speaker for audio output."
  use_audio_in_video:
    type: bool
    label: "Use Audio In Video"
    description: "Extract & use the audio track of input videos."
  seed:
    type: int
    min: -1
    max: 2147483647
    label: "Seed"

load_hints:
  framework: transformers
  model_class: Qwen3OmniMoeForConditionalGeneration
  processor_class: Qwen3OmniMoeProcessor
  hf_repo: Qwen/Qwen3-Omni-30B-A3B-Instruct
  requires_packages:
    - transformers  # from source until released
    - qwen-omni-utils>=0.0.4
    - torch>=2.5.0

serving:
  engine: transformers      # vLLM branch qwen3_omni also available (text-out)
  tensor_parallel_size: 2
  max_model_len: 32768
  attn_implementation: flash_attention_2
  disable_talker_saves_gb: 10

meta:
  license: Apache-2.0
  source: "https://huggingface.co/Qwen/Qwen3-Omni-30B-A3B-Instruct"
  notes: "Thinker+Talker MoE. Inputs: text/image/audio/video. Outputs: text (+ optional speech). 10 output languages."
