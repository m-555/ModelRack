# ── Identity ──────────────────────────────────────────────
model_id: z-image-turbo
display_name: Z-Image Turbo
type: image_generation
backend: local
version: "turbo"
tags: [image, diffusion, turbo, fast]

weights:
  main: weights

hardware:
  min_vram_gb: 16
  recommended_vram_gb: 24
  dtype: bfloat16
  device: cuda

server:
  port: 7802
  host: "127.0.0.1"
  startup_timeout_sec: 120
  endpoints:
    infer:  "POST /infer"
    health: "GET /health"
    unload: "POST /unload"
    info:   "GET /info"

environment:
  python_version: "3.11"
  requirements_file: requirements.txt
  venv_path: .venv

# Distilled "Turbo" model: very few steps, guidance MUST be 0.
defaults:
  num_inference_steps: 8
  guidance_scale: 0.0
  width: 1024
  height: 1024
  seed: -1

param_schema:
  prompt:
    type: str
    label: "Prompt"
    description: "Text description of the image to generate."
  num_inference_steps:
    type: int
    min: 4
    max: 16
    step: 1
    label: "Inference Steps"
    description: "Distilled model — 8 steps recommended."
  guidance_scale:
    type: float
    min: 0.0
    max: 2.0
    step: 0.5
    label: "Guidance Scale"
    description: "Keep at 0.0 for Turbo models."
  width:
    type: int
    options: [512, 768, 1024, 1280, 1536]
    label: "Width"
  height:
    type: int
    options: [512, 768, 1024, 1280, 1536]
    label: "Height"
  seed:
    type: int
    min: -1
    max: 2147483647
    label: "Seed"
    description: "-1 for random."

load_hints:
  framework: diffusers
  pipeline_class: ZImagePipeline
  hf_repo: Tongyi-MAI/Z-Image-Turbo
  requires_packages:
    - diffusers>=0.32.0
    - torch>=2.5.0

serving:
  engine: diffusers
  enable_model_cpu_offload: false

meta:
  license: Apache-2.0
  source: "https://huggingface.co/Tongyi-MAI/Z-Image-Turbo"
  notes: "6B Single-Stream Diffusion Transformer (S3-DiT). Sub-second latency on H800."
