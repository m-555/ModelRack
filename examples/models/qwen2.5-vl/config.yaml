# ── Identity ──────────────────────────────────────────────
model_id: qwen2.5-vl
display_name: Qwen2.5-VL 72B Instruct
type: vision_language
backend: local
version: "2.5"
tags: [vision, language, multimodal, qwen]

weights:
  main: weights

hardware:
  min_vram_gb: 160        # 72B in BF16 needs multi-GPU
  recommended_vram_gb: 320
  dtype: bfloat16
  device: cuda

server:
  port: 7807
  host: "127.0.0.1"
  startup_timeout_sec: 600
  endpoints:
    infer:  "POST /infer"
    health: "GET /health"
    unload: "POST /unload"
    info:   "GET /info"

environment:
  python_version: "3.11"
  requirements_file: requirements.txt
  venv_path: .venv

defaults:
  temperature: 0.7
  top_p: 0.8
  top_k: 20
  repetition_penalty: 1.05
  max_tokens: 512
  seed: -1

param_schema:
  messages:
    type: list
    label: "Messages"
    description: "Chat messages with multimodal content (text/image/video)."
  temperature:
    type: float
    min: 0.0
    max: 2.0
    step: 0.05
    label: "Temperature"
  top_p:
    type: float
    min: 0.0
    max: 1.0
    step: 0.05
    label: "Top-p"
  top_k:
    type: int
    min: 0
    max: 100
    step: 1
    label: "Top-k"
  repetition_penalty:
    type: float
    min: 1.0
    max: 2.0
    step: 0.05
    label: "Repetition Penalty"
  max_tokens:
    type: int
    min: 1
    max: 8192
    step: 1
    label: "Max New Tokens"
  min_pixels:
    type: int
    min: 3136
    max: 12845056
    step: 3136
    label: "Min Image Pixels"
    description: "Lower bound on visual tokens per image."
  max_pixels:
    type: int
    min: 3136
    max: 12845056
    step: 3136
    label: "Max Image Pixels"
    description: "Upper bound on visual tokens per image."
  seed:
    type: int
    min: -1
    max: 2147483647
    label: "Seed"

load_hints:
  framework: transformers
  model_class: Qwen2_5_VLForConditionalGeneration
  hf_repo: Qwen/Qwen2.5-VL-72B-Instruct
  requires_packages:
    - transformers>=4.49.0
    - qwen-vl-utils>=0.0.8
    - torch>=2.5.0

serving:
  engine: vllm            # recommended for 72B; transformers also supported
  tensor_parallel_size: 4
  max_model_len: 32768
  gpu_memory_utilization: 0.9
  attn_implementation: flash_attention_2
  limit_mm_per_prompt: { image: 4, video: 1 }

meta:
  license: Qwen
  source: "https://huggingface.co/Qwen/Qwen2.5-VL-72B-Instruct"
  notes: "Dynamic resolution via min_pixels/max_pixels. Handles long video with dynamic FPS sampling."
