# ── Identity ──────────────────────────────────────────────
model_id: qwen-image-edit
display_name: Qwen-Image-Edit (2511)
type: image_edit
backend: local
version: "2511"
tags: [image, edit, diffusion, qwen]

weights:
  main: weights

hardware:
  min_vram_gb: 24
  recommended_vram_gb: 48
  dtype: bfloat16
  device: cuda

server:
  port: 7804
  host: "127.0.0.1"
  startup_timeout_sec: 180
  endpoints:
    infer:  "POST /infer"
    health: "GET /health"
    unload: "POST /unload"
    info:   "GET /info"

environment:
  python_version: "3.11"
  requirements_file: requirements.txt
  venv_path: .venv

defaults:
  num_inference_steps: 40
  true_cfg_scale: 4.0
  guidance_scale: 1.0
  negative_prompt: " "
  num_images_per_prompt: 1
  seed: -1

param_schema:
  prompt:
    type: str
    label: "Edit Instruction"
    description: "How to edit the input image(s)."
  images:
    type: list
    label: "Input Images"
    description: "One or more base64 PNG images (supports multi-image composition)."
  negative_prompt:
    type: str
    label: "Negative Prompt"
  num_inference_steps:
    type: int
    min: 20
    max: 80
    step: 1
    label: "Inference Steps"
  true_cfg_scale:
    type: float
    min: 1.0
    max: 10.0
    step: 0.5
    label: "True CFG Scale"
    description: "Prompt adherence. Default 4.0."
  guidance_scale:
    type: float
    min: 0.0
    max: 5.0
    step: 0.5
    label: "Distilled Guidance"
    description: "Embedded guidance value. Default 1.0."
  num_images_per_prompt:
    type: int
    min: 1
    max: 4
    step: 1
    label: "Images per Prompt"
  seed:
    type: int
    min: -1
    max: 2147483647
    label: "Seed"
    description: "-1 for random."

load_hints:
  framework: diffusers
  pipeline_class: QwenImageEditPlusPipeline
  hf_repo: Qwen/Qwen-Image-Edit-2511
  requires_packages:
    - diffusers>=0.32.0
    - torch>=2.5.0
    - transformers>=4.49.0

serving:
  engine: diffusers
  enable_model_cpu_offload: true

meta:
  license: Apache-2.0
  source: "https://huggingface.co/Qwen/Qwen-Image-Edit-2511"
  notes: "Accepts multiple input images as a list for multi-person/object composition. Needs a recent diffusers."
